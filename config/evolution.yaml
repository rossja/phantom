# Self-Evolution Engine Configuration
#
# Phase 3 simplified this file: the 6-judge pipeline is gone, replaced by a
# single reflection subprocess that the agent itself drives. Cadence tuning
# lives in phantom-config/meta/evolution.json at runtime.

# Reflection subprocess enable flag
reflection:
  # "auto" enables when an Agent SDK credential path exists
  # "always" enables unconditionally
  # "never" disables unconditionally (e.g. for offline CI)
  enabled: "auto"

# Directory paths (relative to project root)
paths:
  config_dir: "phantom-config"
  constitution: "phantom-config/constitution.md"
  version_file: "phantom-config/meta/version.json"
  metrics_file: "phantom-config/meta/metrics.json"
  evolution_log: "phantom-config/meta/evolution-log.jsonl"
  session_log: "phantom-config/memory/session-log.jsonl"
