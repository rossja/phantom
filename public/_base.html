<!DOCTYPE html>
<html lang="en" data-theme="phantom-light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}} - {{AGENT_NAME_CAPITALIZED}}</title>

  <!-- Flash prevention: set theme before any paint -->
  <script>
    (function() {
      var stored = localStorage.getItem('phantom-theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = stored || (prefersDark ? 'phantom-dark' : 'phantom-light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <!-- Fonts: Instrument Serif (display), Inter (UI), JetBrains Mono (code) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- DaisyUI + Tailwind (unchanged, base layer) -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Syntax highlighting (auto-switches with theme) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css" id="hljs-light">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css" id="hljs-dark" disabled>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script>
    (function() {
      var theme = document.documentElement.getAttribute('data-theme');
      var isLight = theme === 'phantom-light';
      var ls = document.getElementById('hljs-light');
      var ds = document.getElementById('hljs-dark');
      if (ls) ls.disabled = !isLight;
      if (ds) ds.disabled = isLight;
    })();
  </script>

  <!-- DaisyUI theme variables (Tailwind v4 parser-safe block) -->
  <style type="text/tailwindcss">
    @theme {
      --color-phantom: #5e6ad2;
      --color-phantom-ink: #141413;
      --color-phantom-cream: #faf9f5;
      --font-family-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --font-family-serif: 'Instrument Serif', Georgia, 'Times New Roman', serif;
      --font-family-mono: 'JetBrains Mono', ui-monospace, monospace;
    }

    /* Light theme: warm cream, serif accent, dark-ink primary */
    [data-theme="phantom-light"] {
      --color-base-100: #faf9f5;
      --color-base-200: #ffffff;
      --color-base-300: #ece9df;
      --color-base-content: #1c1917;

      --color-primary: #4850c4;
      --color-primary-content: #ffffff;

      --color-secondary: #57534e;
      --color-secondary-content: #ffffff;

      --color-accent: #4850c4;
      --color-accent-content: #ffffff;

      --color-neutral: #f1efe6;
      --color-neutral-content: #57534e;

      --color-info: #2563eb;
      --color-info-content: #ffffff;
      --color-success: #16a34a;
      --color-success-content: #ffffff;
      --color-warning: #ca8a04;
      --color-warning-content: #ffffff;
      --color-error: #dc2626;
      --color-error-content: #ffffff;

      --radius-box: 14px;
      --radius-field: 10px;
      --radius-selector: 8px;
      --border: 1px;
      --depth: 1;
      --noise: 0;
      color-scheme: light;
    }

    /* Dark theme: warm deep near-black, same indigo, same serif */
    [data-theme="phantom-dark"] {
      --color-base-100: #0b0a09;
      --color-base-200: #161412;
      --color-base-300: #26211d;
      --color-base-content: #f7f6f1;

      --color-primary: #7078e0;
      --color-primary-content: #0b0a09;

      --color-secondary: #a8a29e;
      --color-secondary-content: #0b0a09;

      --color-accent: #7078e0;
      --color-accent-content: #0b0a09;

      --color-neutral: #161412;
      --color-neutral-content: #a8a29e;

      --color-info: #60a5fa;
      --color-info-content: #0b0a09;
      --color-success: #4ade80;
      --color-success-content: #0b0a09;
      --color-warning: #fbbf24;
      --color-warning-content: #0b0a09;
      --color-error: #f87171;
      --color-error-content: #0b0a09;

      --radius-box: 14px;
      --radius-field: 10px;
      --radius-selector: 8px;
      --border: 1px;
      --depth: 1;
      --noise: 0;
      color-scheme: dark;
    }
  </style>

  <!-- Phantom design tokens and vocabulary (plain CSS, var() safe here) -->
  <style>
    /* === Root tokens: spacing, motion, z-index === */
    :root {
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;
      --space-12: 48px;
      --space-16: 64px;

      --radius-xs: 6px;
      --radius-sm: 8px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --radius-xl: 20px;
      --radius-pill: 9999px;

      --motion-fast: 100ms;
      --motion-base: 150ms;
      --motion-slow: 300ms;
      --ease-out: cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --ease-reveal: cubic-bezier(0.4, 0, 0.2, 1);
      --ease-pulse: cubic-bezier(0.4, 0, 0.6, 1);

      --z-raised: 1;
      --z-nav: 10;
      --z-dropdown: 100;
      --z-modal: 1000;
      --z-toast: 10000;

      --shadow-card-hover: 0 4px 16px rgba(0, 0, 0, 0.06);
      --shadow-modal: rgba(60, 66, 87, 0.08) 0 7px 14px 0, rgba(0, 0, 0, 0.12) 0 3px 6px 0;
      --shadow-toast: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    [data-theme="phantom-dark"] {
      --shadow-card-hover: 0 4px 16px rgba(0, 0, 0, 0.3);
      --shadow-modal: rgba(0, 0, 0, 0.4) 0 8px 20px 0, rgba(0, 0, 0, 0.3) 0 3px 6px 0;
      --shadow-toast: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    /* === Body baseline === */
    html {
      transition: background-color var(--motion-base) ease, color var(--motion-base) ease;
    }

    body {
      font-feature-settings: "ss01", "cv11";
      font-variant-numeric: tabular-nums;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    @keyframes phantom-fade-in {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes phantom-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }

    @keyframes phantom-shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    main {
      animation: phantom-fade-in var(--motion-slow) var(--ease-reveal);
    }

    /* === Layout primitives === */
    .phantom-page {
      max-width: 1240px;
      margin: 0 auto;
      padding: var(--space-6) var(--space-8);
    }
    .phantom-page-narrow {
      max-width: 760px;
      margin: 0 auto;
      padding: var(--space-6) var(--space-8);
    }
    .phantom-section { margin-bottom: var(--space-10); }
    .phantom-section + .phantom-section { margin-top: var(--space-10); }

    .phantom-row { display: flex; gap: var(--space-4); align-items: center; }
    .phantom-col { display: flex; flex-direction: column; gap: var(--space-4); }

    .phantom-grid-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: var(--space-4);
    }
    .phantom-grid-main-side {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: var(--space-6);
    }
    .phantom-grid-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--space-4);
    }
    @media (max-width: 900px) {
      .phantom-grid-stats { grid-template-columns: repeat(2, 1fr); }
      .phantom-grid-main-side { grid-template-columns: 1fr; }
    }

    .phantom-divider {
      height: 1px;
      background: var(--color-base-300);
      border: 0;
      margin: var(--space-6) 0;
    }

    /* === Typography === */
    .phantom-display {
      font-family: var(--font-family-serif);
      font-size: clamp(40px, 5vw, 60px);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--color-base-content);
      margin: 0 0 var(--space-4);
    }
    .phantom-display em {
      font-style: italic;
      font-weight: 400;
    }

    .phantom-h1 {
      font-family: var(--font-family-serif);
      font-size: 32px;
      font-weight: 500;
      line-height: 1.15;
      letter-spacing: -0.01em;
      color: var(--color-base-content);
      margin: 0 0 var(--space-3);
    }

    .phantom-h2 {
      font-family: var(--font-family-serif);
      font-size: 22px;
      font-weight: 500;
      line-height: 1.25;
      letter-spacing: -0.005em;
      color: var(--color-base-content);
      margin: 0 0 var(--space-3);
    }

    .phantom-h3 {
      font-family: var(--font-family-sans);
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
      letter-spacing: -0.002em;
      color: var(--color-base-content);
      margin: 0 0 var(--space-2);
    }

    .phantom-eyebrow {
      font-family: var(--font-family-sans);
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: color-mix(in oklab, var(--color-base-content) 50%, transparent);
      margin: 0 0 var(--space-2);
    }

    .phantom-lead {
      font-family: var(--font-family-sans);
      font-size: 16px;
      font-weight: 400;
      line-height: 1.6;
      letter-spacing: -0.005em;
      color: color-mix(in oklab, var(--color-base-content) 72%, transparent);
    }

    .phantom-body {
      font-family: var(--font-family-sans);
      font-size: 14px;
      font-weight: 400;
      line-height: 1.55;
      letter-spacing: -0.003em;
      color: var(--color-base-content);
    }

    .phantom-muted {
      color: color-mix(in oklab, var(--color-base-content) 55%, transparent);
    }

    .phantom-mono {
      font-family: var(--font-family-mono);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
    }

    .phantom-meta {
      font-family: var(--font-family-sans);
      font-size: 12px;
      font-weight: 400;
      color: color-mix(in oklab, var(--color-base-content) 55%, transparent);
    }

    /* === Cards === */
    .phantom-card {
      background: var(--color-base-200);
      border: 1px solid var(--color-base-300);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      transition: border-color var(--motion-base) var(--ease-out),
                  background-color var(--motion-base) var(--ease-out);
    }
    .phantom-card:hover {
      border-color: color-mix(in oklab, var(--color-primary) 28%, var(--color-base-300));
    }

    .phantom-card-compact {
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
    }

    .phantom-card-hover {
      cursor: pointer;
    }
    .phantom-card-hover:hover {
      box-shadow: var(--shadow-card-hover);
      border-color: color-mix(in oklab, var(--color-primary) 35%, var(--color-base-300));
    }

    /* === Stats === */
    .phantom-stat {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
    }
    .phantom-stat-label {
      font: 600 11px/1 var(--font-family-sans);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: color-mix(in oklab, var(--color-base-content) 48%, transparent);
      margin: 0;
    }
    .phantom-stat-value {
      font-family: var(--font-family-sans);
      font-size: 28px;
      font-weight: 500;
      line-height: 1.1;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      color: var(--color-base-content);
      margin: 0;
    }
    .phantom-stat-value-serif {
      font-family: var(--font-family-serif);
      font-weight: 500;
    }
    .phantom-stat-trend-up {
      color: var(--color-success);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .phantom-stat-trend-down {
      color: var(--color-error);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .phantom-stat-trend-flat {
      color: color-mix(in oklab, var(--color-base-content) 50%, transparent);
      font-size: 12px;
    }

    /* === Tables === */
    .phantom-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-family-sans);
    }
    .phantom-table thead th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: color-mix(in oklab, var(--color-base-content) 45%, transparent);
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--color-base-300);
    }
    .phantom-table tbody td {
      padding: var(--space-3) var(--space-4);
      font-size: 13px;
      line-height: 1.4;
      border-bottom: 1px solid color-mix(in oklab, var(--color-base-300) 50%, transparent);
      font-variant-numeric: tabular-nums;
    }
    .phantom-table tbody tr:last-child td { border-bottom: none; }
    .phantom-table tbody tr:hover td {
      background: color-mix(in oklab, var(--color-primary) 4%, transparent);
    }
    .phantom-table-compact tbody td { padding: var(--space-2) var(--space-3); font-size: 12px; }

    /* === Badges and chips === */
    .phantom-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-family-sans);
      font-size: 11px;
      font-weight: 500;
      line-height: 1;
      padding: 4px 9px;
      border-radius: var(--radius-pill);
      background: color-mix(in oklab, var(--color-base-content) 8%, transparent);
      color: color-mix(in oklab, var(--color-base-content) 75%, transparent);
    }
    .phantom-badge-primary { background: color-mix(in oklab, var(--color-primary) 12%, transparent); color: var(--color-primary); }
    .phantom-badge-success { background: color-mix(in oklab, var(--color-success) 12%, transparent); color: var(--color-success); }
    .phantom-badge-error   { background: color-mix(in oklab, var(--color-error) 12%, transparent);   color: var(--color-error); }
    .phantom-badge-warning { background: color-mix(in oklab, var(--color-warning) 14%, transparent); color: var(--color-warning); }
    .phantom-badge-info    { background: color-mix(in oklab, var(--color-info) 12%, transparent);    color: var(--color-info); }
    .phantom-badge-neutral { background: color-mix(in oklab, var(--color-base-content) 6%, transparent); color: color-mix(in oklab, var(--color-base-content) 70%, transparent); }

    .phantom-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 4px 10px;
      border: 1px solid var(--color-base-300);
      border-radius: var(--radius-pill);
      background: transparent;
      color: var(--color-base-content);
      cursor: pointer;
      transition: border-color var(--motion-fast) var(--ease-out), background-color var(--motion-fast) var(--ease-out);
    }
    .phantom-chip:hover {
      border-color: color-mix(in oklab, var(--color-primary) 40%, var(--color-base-300));
      background: color-mix(in oklab, var(--color-primary) 4%, transparent);
    }
    .phantom-chip[aria-pressed="true"] {
      background: color-mix(in oklab, var(--color-primary) 10%, transparent);
      border-color: color-mix(in oklab, var(--color-primary) 45%, var(--color-base-300));
      color: var(--color-primary);
    }

    /* === Status dot === */
    .phantom-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
      background: var(--color-base-content);
    }
    .phantom-dot-success { background: var(--color-success); }
    .phantom-dot-warning { background: var(--color-warning); }
    .phantom-dot-error { background: var(--color-error); }
    .phantom-dot-info { background: var(--color-info); }
    .phantom-dot-live {
      background: var(--color-success);
      box-shadow: 0 0 0 3px color-mix(in oklab, var(--color-success) 25%, transparent);
      animation: phantom-pulse 2s var(--ease-pulse) infinite;
    }

    /* === Timeline === */
    .phantom-timeline {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      position: relative;
      padding-left: var(--space-6);
    }
    .phantom-timeline::before {
      content: '';
      position: absolute;
      top: 6px;
      bottom: 6px;
      left: 5px;
      width: 1px;
      background: var(--color-base-300);
    }
    .phantom-timeline-item {
      position: relative;
      padding-bottom: var(--space-2);
    }
    .phantom-timeline-item::before {
      content: '';
      position: absolute;
      left: calc(var(--space-6) * -1 + 1px);
      top: 6px;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--color-base-200);
      border: 1.5px solid var(--color-primary);
    }
    .phantom-timeline-item-time {
      font-size: 11px;
      color: color-mix(in oklab, var(--color-base-content) 50%, transparent);
      font-variant-numeric: tabular-nums;
      margin-bottom: 4px;
    }
    .phantom-timeline-item-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--color-base-content);
      margin-bottom: 4px;
    }
    .phantom-timeline-item-body {
      font-size: 13px;
      color: color-mix(in oklab, var(--color-base-content) 70%, transparent);
      line-height: 1.5;
    }

    /* === Empty state === */
    .phantom-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-12) var(--space-4);
      text-align: center;
      border: 1px dashed var(--color-base-300);
      border-radius: var(--radius-lg);
      color: color-mix(in oklab, var(--color-base-content) 60%, transparent);
    }
    .phantom-empty-icon {
      width: 40px;
      height: 40px;
      margin-bottom: var(--space-3);
      opacity: 0.35;
    }
    .phantom-empty-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--color-base-content);
      margin-bottom: var(--space-1);
    }
    .phantom-empty-body {
      font-size: 13px;
      max-width: 360px;
      line-height: 1.55;
    }

    /* === Forms === */
    .phantom-form-row {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      margin-bottom: var(--space-4);
    }
    .phantom-label {
      font-size: 12px;
      font-weight: 500;
      color: color-mix(in oklab, var(--color-base-content) 72%, transparent);
      letter-spacing: -0.003em;
    }
    .phantom-input, .phantom-textarea, .phantom-select {
      width: 100%;
      font-family: var(--font-family-sans);
      font-size: 14px;
      line-height: 1.4;
      background: var(--color-base-100);
      color: var(--color-base-content);
      border: 1px solid var(--color-base-300);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      transition: border-color var(--motion-base) var(--ease-out),
                  box-shadow var(--motion-base) var(--ease-out);
    }
    .phantom-input::placeholder, .phantom-textarea::placeholder {
      color: color-mix(in oklab, var(--color-base-content) 40%, transparent);
    }
    .phantom-input:focus, .phantom-textarea:focus, .phantom-select:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px color-mix(in oklab, var(--color-primary) 18%, transparent);
    }
    .phantom-textarea {
      min-height: 120px;
      resize: vertical;
      font-family: var(--font-family-mono);
      font-size: 13px;
      line-height: 1.55;
    }

    .phantom-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      font-family: var(--font-family-sans);
      font-size: 14px;
      font-weight: 500;
      line-height: 1;
      padding: 11px 18px;
      border-radius: var(--radius-pill);
      border: 1px solid transparent;
      background: var(--color-base-content);
      color: var(--color-base-100);
      cursor: pointer;
      text-decoration: none;
      transition: opacity var(--motion-fast) var(--ease-out),
                  transform var(--motion-fast) var(--ease-out);
    }
    .phantom-button:hover { opacity: 0.88; }
    .phantom-button:active { transform: translateY(1px); }
    .phantom-button:disabled { opacity: 0.5; cursor: not-allowed; }

    .phantom-button-primary {
      background: var(--color-primary);
      color: var(--color-primary-content);
    }

    .phantom-button-ghost {
      background: transparent;
      color: var(--color-base-content);
      border-color: var(--color-base-300);
    }
    .phantom-button-ghost:hover {
      background: color-mix(in oklab, var(--color-base-content) 5%, transparent);
      opacity: 1;
    }

    .phantom-button-danger {
      background: var(--color-error);
      color: var(--color-error-content);
    }

    .phantom-button-sm {
      font-size: 13px;
      padding: 7px 14px;
    }

    /* === Alerts === */
    .phantom-alert {
      display: flex;
      gap: var(--space-3);
      align-items: flex-start;
      padding: var(--space-3) var(--space-4);
      border: 1px solid var(--color-base-300);
      border-radius: var(--radius-md);
      background: var(--color-base-200);
      font-size: 13px;
      line-height: 1.5;
    }

      }
    };

    if (typeof echarts !== 'undefined') {
      echarts.registerTheme('phantom-light', window.phantomChartTheme.light);
      echarts.registerTheme('phantom-dark', window.phantomChartTheme.dark);
    }

    // Helper: init an ECharts chart on an element, theme-aware, auto-redraw on theme toggle
    window.phantomChart = function(el, option) {
      if (typeof echarts === 'undefined') { console.warn('ECharts not loaded'); return null; }
      var theme = document.documentElement.getAttribute('data-theme') || 'phantom-light';
      var chart = echarts.init(el, theme);
      chart.setOption(option);
      var resizeHandler = function() { chart.resize(); };
      window.addEventListener('resize', resizeHandler);
      var observer = new MutationObserver(function() {
        var current = document.documentElement.getAttribute('data-theme') || 'phantom-light';
        chart.dispose();
        chart = echarts.init(el, current);
        chart.setOption(option);
      });
      observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
      return chart;
    };

    window.getPhantomChartTheme = function() {
      return document.documentElement.getAttribute('data-theme') || 'phantom-light';
    };

  <!-- Theme toggle handler -->
  <script>
    (function() {
      var toggle = document.getElementById('theme-toggle');
      if (!toggle) return;
      var sun = document.getElementById('icon-sun');
      var moon = document.getElementById('icon-moon');

      function updateIcons() {
        var theme = document.documentElement.getAttribute('data-theme');
        var isDark = theme === 'phantom-dark';
        if (sun) sun.style.display = isDark ? 'inline' : 'none';
        if (moon) moon.style.display = isDark ? 'none' : 'inline';
        var ls = document.getElementById('hljs-light');
        var ds = document.getElementById('hljs-dark');
        if (ls) ls.disabled = isDark;
        if (ds) ds.disabled = !isDark;
      }

      updateIcons();

      toggle.addEventListener('click', function() {
        var current = document.documentElement.getAttribute('data-theme');
        var next = current === 'phantom-dark' ? 'phantom-light' : 'phantom-dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('phantom-theme', next);
        updateIcons();
      });

      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
        if (!localStorage.getItem('phantom-theme')) {
          document.documentElement.setAttribute('data-theme', e.matches ? 'phantom-dark' : 'phantom-light');
          updateIcons();
        }
      });
    })();
  </script>
