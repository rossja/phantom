<!DOCTYPE html>
<html lang="en" data-theme="phantom-light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title data-agent-name-title>Sign in</title>
<link rel="icon" href="data:,">
<script>(function(){var s=localStorage.getItem('phantom-theme');var d=window.matchMedia('(prefers-color-scheme: dark)').matches;document.documentElement.setAttribute('data-theme',s||(d?'phantom-dark':'phantom-light'));})();</script>
<script>
(function(){
  function cap(n){if(!n)return "";var t=String(n).trim();if(!t)return "";return t.split(/([-_])/).map(function(p){if(p==="-"||p==="_")return p;if(!p.length)return p;return p.charAt(0).toUpperCase()+p.slice(1).toLowerCase();}).join("");}
  function apply(name){
    if(!name)return;
    var disp=cap(name);
    var initial=disp?disp.charAt(0).toUpperCase():"P";
    document.querySelectorAll("[data-agent-name]").forEach(function(el){el.textContent=disp;});
    document.querySelectorAll("[data-agent-name-initial]").forEach(function(el){el.textContent=initial;});
    var t=document.querySelector("title[data-agent-name-title]");
    if(t){t.textContent="Sign in - "+disp;}
  }
  var cached=localStorage.getItem("phantom-agent-name")||"";
  if(cached){apply(cached);}
  fetch("/health").then(function(r){return r.json();}).then(function(d){if(d&&d.agent){localStorage.setItem("phantom-agent-name",d.agent);apply(d.agent);}}).catch(function(){});
  document.addEventListener("DOMContentLoaded",function(){var c=localStorage.getItem("phantom-agent-name")||"";if(c)apply(c);});
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<style type="text/tailwindcss">
@theme { --font-family-sans: 'Inter', system-ui, sans-serif; --font-family-serif: 'Instrument Serif', Georgia, serif; }
[data-theme="phantom-light"] { --color-base-100:#faf9f5; --color-base-200:#ffffff; --color-base-300:#ece9df; --color-base-content:#1c1917; --color-primary:#4850c4; --color-primary-content:#ffffff; --color-success:#16a34a; --color-error:#dc2626; color-scheme:light; }
[data-theme="phantom-dark"] { --color-base-100:#0b0a09; --color-base-200:#161412; --color-base-300:#26211d; --color-base-content:#f7f6f1; --color-primary:#7078e0; --color-primary-content:#0b0a09; --color-success:#4ade80; --color-error:#f87171; color-scheme:dark; }
</style>

<style>
html { transition: background-color 150ms ease, color 150ms ease; }
body { background:var(--color-base-100); color:var(--color-base-content); font-family:Inter,system-ui,sans-serif; margin:0; min-height:100vh; display:flex; flex-direction:column; -webkit-font-smoothing:antialiased; }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
@keyframes spin { to { transform:rotate(360deg); } }

.top-bar { display:flex; align-items:center; justify-content:space-between; padding:20px 32px; }
.brand { display:inline-flex; align-items:center; gap:8px; font-family:'Instrument Serif',Georgia,serif; font-size:20px; font-weight:400; color:var(--color-base-content); text-decoration:none; }
.brand-logo { width:24px; height:24px; border-radius:6px; background:var(--color-primary); display:inline-flex; align-items:center; justify-content:center; color:var(--color-primary-content); font-family:'Instrument Serif',serif; font-size:14px; }
.top-action { display:inline-flex; align-items:center; gap:8px; padding:9px 16px; border:1px solid var(--color-base-300); border-radius:9999px; font-size:13px; font-weight:500; color:var(--color-base-content); background:transparent; text-decoration:none; transition:background-color 150ms, border-color 150ms; }
.top-action:hover { background:color-mix(in oklab, var(--color-base-content) 5%, transparent); }

.login-main { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px; }
.login-shell { width:100%; max-width:420px; animation: fadeUp 0.4s cubic-bezier(0.25,0.46,0.45,0.94); }
.login-display { font-family:'Instrument Serif',Georgia,serif; font-size:48px; font-weight:400; line-height:1.08; text-align:center; letter-spacing:-0.01em; color:var(--color-base-content); margin:0 0 12px; }
.login-display em { font-style:italic; }
.login-subtitle { text-align:center; font-size:15px; line-height:1.55; color:color-mix(in oklab, var(--color-base-content) 68%, transparent); margin:0 0 32px; max-width:340px; margin-left:auto; margin-right:auto; }

.form-row { margin-bottom:18px; }
.phantom-label { display:block; font-size:12px; font-weight:500; color:color-mix(in oklab, var(--color-base-content) 72%, transparent); margin-bottom:6px; }
.phantom-input { width:100%; box-sizing:border-box; font-family:Inter,sans-serif; font-size:14px; line-height:1.4; background:var(--color-base-200); color:var(--color-base-content); border:1px solid var(--color-base-300); border-radius:10px; padding:12px 14px; transition:border-color 150ms, box-shadow 150ms; }
.phantom-input::placeholder { color:color-mix(in oklab, var(--color-base-content) 38%, transparent); }
.phantom-input:focus { outline:none; border-color:var(--color-primary); box-shadow:0 0 0 3px color-mix(in oklab, var(--color-primary) 18%, transparent); }

.phantom-button { display:inline-flex; width:100%; align-items:center; justify-content:center; gap:8px; font-family:Inter,sans-serif; font-size:14px; font-weight:500; line-height:1; padding:12px 18px; border-radius:9999px; border:1px solid transparent; background:var(--color-base-content); color:var(--color-base-100); cursor:pointer; text-decoration:none; transition:opacity 100ms, transform 100ms; }
.phantom-button:hover { opacity:0.88; }
.phantom-button:active { transform:translateY(1px); }
.phantom-button:disabled { opacity:0.5; cursor:not-allowed; }
.btn-spinner { display:inline-block; width:14px; height:14px; border:2px solid currentColor; border-right-color:transparent; border-radius:50%; animation:spin 0.6s linear infinite; }

.divider { display:flex; align-items:center; gap:12px; margin:24px 0; }
.divider-line { flex:1; height:1px; background:var(--color-base-300); }
.divider-text { font-size:11px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:color-mix(in oklab, var(--color-base-content) 45%, transparent); }

.helper { text-align:center; font-size:13px; line-height:1.55; color:color-mix(in oklab, var(--color-base-content) 58%, transparent); max-width:340px; margin:0 auto; }

.alert-error { margin-top:16px; display:none; align-items:flex-start; gap:10px; padding:10px 12px; border:1px solid color-mix(in oklab, var(--color-error) 40%, var(--color-base-300)); border-radius:10px; background:color-mix(in oklab, var(--color-error) 6%, transparent); font-size:12px; color:var(--color-error); }
.alert-error.visible { display:flex; }

.footer-strip { padding:24px 32px; border-top:1px solid var(--color-base-300); display:flex; align-items:center; justify-content:space-between; font-size:11px; color:color-mix(in oklab, var(--color-base-content) 50%, transparent); font-family:'JetBrains Mono',monospace; }
</style>
</head>
<body>

<div class="top-bar">
  <a href="/" class="brand">
    <span class="brand-logo" data-agent-name-initial>&nbsp;</span>
    <span data-agent-name>&nbsp;</span>
  </a>
  <button id="theme-toggle" class="top-action" aria-label="Toggle theme">
    <svg id="icon-moon" style="width:14px;height:14px;" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"/></svg>
    <svg id="icon-sun" style="width:14px;height:14px;display:none;" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/></svg>
    <span>Theme</span>
  </button>
</div>

<main class="login-main">
  <div class="login-shell">

    <h1 class="login-display">Welcome <em>back</em>.</h1>
    <p class="login-subtitle">Sign in with the access token <span data-agent-name>&nbsp;</span> sent you, or paste a magic link.</p>

    <form id="login-form" autocomplete="off">

      <div class="form-row">
        <label class="phantom-label" for="token">Access token</label>
        <input class="phantom-input" id="token" name="token" type="text" placeholder="phantom_..." autocomplete="off" spellcheck="false">
      </div>

      <button type="submit" id="submit-btn" class="phantom-button">Continue</button>

      <div id="error-msg" class="alert-error">
        <svg style="width:14px;height:14px;flex-shrink:0;margin-top:1px;" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/></svg>
        <span id="error-text">Invalid token. Please try again.</span>
      </div>

    </form>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">Or</span>
      <div class="divider-line"></div>
    </div>

    <p class="helper">Ask <span data-agent-name>&nbsp;</span> in Slack for a magic link.<br>It will be valid for 10 minutes and the resulting session lasts 7 days.</p>

  </div>
</main>

<div class="footer-strip">
  <span><span data-agent-name>&nbsp;</span> - AI that works alongside you</span>
  <span>v0.18.2</span>
</div>

<script>
(function(){
  var toggle=document.getElementById('theme-toggle');
  var sun=document.getElementById('icon-sun'); var moon=document.getElementById('icon-moon');
  function update(){ var d=document.documentElement.getAttribute('data-theme')==='phantom-dark'; sun.style.display=d?'inline':'none'; moon.style.display=d?'none':'inline'; }
  update();
  toggle.addEventListener('click',function(){ var c=document.documentElement.getAttribute('data-theme'); var n=c==='phantom-dark'?'phantom-light':'phantom-dark'; document.documentElement.setAttribute('data-theme',n); localStorage.setItem('phantom-theme',n); update(); });
})();
(function(){
  var form=document.getElementById('login-form');
  form.addEventListener('submit',function(e){ e.preventDefault(); var t=document.getElementById('token').value.trim(); if(!t){ document.getElementById('error-text').textContent='Please enter an access token.'; document.getElementById('error-msg').classList.add('visible'); return; } var btn=document.getElementById('submit-btn'); btn.disabled=true; btn.innerHTML='<span class="btn-spinner"></span> Signing in...'; setTimeout(function(){ btn.disabled=false; btn.innerHTML='Continue'; document.getElementById('error-text').textContent='This is a preview. Real flow posts to /ui/login.'; document.getElementById('error-msg').classList.add('visible'); },800); });
})();
</script>
</body>
</html>
